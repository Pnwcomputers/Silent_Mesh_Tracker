# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — HOUSE SIREN UNIT
# Hardware: ESP32-WROOM-32 + 5V Relay + 12V Siren
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: house-siren
  friendly_name: House Siren

esp32:
  board: esp32dev

api:
ota:
wifi:
  networks:
    - ssid: "Your_WiFi_Name"
      password: "Your_WiFi_Password"

# --- Hardware Output ---
switch:
  - platform: gpio
    pin: GPIO13
    name: "Siren Relay"
    id: siren_relay
    inverted: false # Adjust based on your relay's high/low trigger

# --- Physical "Wall Kill" Button ---
binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    name: "Wall Kill Button"
    on_press:
      then:
        - switch.turn_off: siren_relay
        - logger.log: "⚠️ SIREN KILLED MANUALLY VIA WALL BUTTON"

# --- Safety Script (Auto-Off) ---
script:
  - id: trigger_alarm
    mode: restart
    then:
      - switch.turn_on: siren_relay
      - delay: 60s # Auto-shutoff to prevent burnout/noise complaints
      - switch.turn_off: siren_relay
