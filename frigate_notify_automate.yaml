automation:
  - alias: "Car Alarm - Send Frigate Snapshot"
    id: car_alarm_frigate_snapshot
    trigger:
      - platform: state
        entity_id: binary_sensor.car_security_upgraded_car_presence
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_armed
        state: "on"
    action:
      - delay: 00:00:02 # Brief delay for Frigate to process the event
      - service: notify.mobile_app_your_phone
        data:
          title: "🚨 INTRUDER CONFIRMED"
          message: "Movement detected inside vehicle."
          data:
            image: "/api/frigate/notifications/{{ trigger.entity_id }}/snapshot.jpg"
            tag: car-intrusion
            priority: high
            ttl: 0
