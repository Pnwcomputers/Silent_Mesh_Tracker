# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — ZIGBEE REMOTE KILL SWITCH
# ═══════════════════════════════════════════════════════════════════

automation:
  - alias: "Car Alarm - Zigbee Kill Switch"
    id: car_alarm_zigbee_kill
    mode: single
    trigger:
      # Common Zigbee button actions (Adjust based on your specific button)
      - platform: device
        domain: mqtt
        device_id: your_zigbee_button_id
        type: action
        subtype: single  # Single click to Disarm
    action:
      # 1. Disarm the System
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_armed
      
      # 2. Kill the House Siren (Unit 2)
      - service: switch.turn_off
        target:
          entity_id: switch.house_siren_siren_relay
          
      # 3. Notify Mobile that system was killed physically
      - service: notify.mobile_app_your_phone
        data:
          title: "🛑 Alarm Disarmed Locally"
          message: "Zigbee Kill-Switch pressed. Siren silenced."

  - alias: "Car Alarm - Zigbee Panic Trigger"
    id: car_alarm_zigbee_panic
    trigger:
      - platform: device
        domain: mqtt
        device_id: your_zigbee_button_id
        type: action
        subtype: double  # Double click to Panic
    action:
      - service: esphome.house_siren_trigger_alarm
