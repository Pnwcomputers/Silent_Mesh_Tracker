# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — UPGRADED HA AUTOMATIONS
# Ties Car S3 (LTE/GPS) to House Siren (WROOM-32)
# ═══════════════════════════════════════════════════════════════════

automation:
# ── 1: Vibration only — Notification + Frigate ──
  - alias: "Car Alarm - Vibration Detected"
    id: car_alarm_vibration
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.car_security_upgraded_car_vibration
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_armed
        state: "on"
    action:
      - service: notify.mobile_app_your_phone
        data:
          title: "⚠️ Car Alarm — Vibration"
          message: "Vehicle disturbance detected"
          data:
            ttl: 0
            priority: high
            image: /api/camera_proxy/camera.driveway
            actions:
              - action: DISARM_CAR_ALARM
                title: Disarm
              - action: TRIGGER_SIREN
                title: Trigger Siren
      - service: switch.turn_on
        target:
          entity_id: switch.frigate_driveway_record

# ── 2: Presence confirmed — Escalate / Geofence Logic ──
  - alias: "Car Alarm - Intruder Confirmed"
    id: car_alarm_intruder
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.car_security_upgraded_car_presence
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_armed
        state: "on"
    action:
      - choose:
          # CASE: Car is at Home (Zone Check)
          - conditions:
              - condition: zone
                entity_id: device_tracker.car_security_upgraded
                zone: zone.home
            sequence:
              - service: esphome.house_siren_trigger_alarm
              - service: text_sensor.set_value
                target:
                  entity_id: text_sensor.house_siren_last_trigger_source
                data:
                  value: "Car Intrusion"
              - service: notify.mobile_app_your_phone
                data:
                  title: "🚨 INTRUDER — Car Alarm Active"
                  message: "Presence confirmed in vehicle. Siren triggered."
                  data:
                    image: /api/camera_proxy/camera.driveway
                    actions:
                      - action: DISARM_CAR_ALARM
                        title: Disarm

          # CASE: Car is Away (Theft in Progress)
          - conditions:
              - condition: not
                conditions:
                  - condition: zone
                    entity_id: device_tracker.car_security_upgraded
                    zone: zone.home
            sequence:
              - service: notify.mobile_app_your_phone
                data:
                  title: "🚨 VEHICLE STOLEN / MOVING"
                  message: "Car moved while armed! Live Map: {{ state_attr('device_tracker.car_security_upgraded', 'latitude') }}, {{ state_attr('device_tracker.car_security_upgraded', 'longitude') }}"
                  data:
                    priority: high
                    clickAction: "/lovelace/car-map"

# ── 3: Mobile action — Disarm & Kill ──
  - alias: "Car Alarm - Mobile Disarm Action"
    id: car_alarm_disarm_action
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: DISARM_CAR_ALARM
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_armed
      - service: switch.turn_off
        target:
          entity_id: switch.house_siren_siren_relay

# ── 4: Mobile action — Manual Siren Trigger ──
  - alias: "Car Alarm - Mobile Siren Trigger"
    id: car_alarm_manual_siren
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: TRIGGER_SIREN
    action:
      - service: esphome.house_siren_trigger_alarm

# ── 5: Scheduled Windows ──
  - alias: "Car Alarm - Scheduled Arm 10PM"
    id: car_alarm_scheduled_arm
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_maintenance
        state: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.car_alarm_armed

  - alias: "Car Alarm - Scheduled Disarm 6AM"
    id: car_alarm_scheduled_disarm
    trigger:
      - platform: time
        at: "06:00:00"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_armed

# ── 6: Maintenance Overrides ──
  - alias: "Car Alarm - Maintenance Overnight Warning"
    id: car_alarm_maintenance_overnight_warning
    mode: single
    trigger:
      - platform: time_pattern
        hours: "/1"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_maintenance
        state: "on"
      - condition: time
        after: "22:00:00"
        before: "06:00:00"
    action:
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm Still in Maintenance"
          message: "The alarm is DISARMED overnight. Maintenance mode is still ON."
          data:
            actions:
              - action: CLEAR_MAINTENANCE
                title: Rearm Now

# ── 7: Mobile Clear Maintenance ──
  - alias: "Car Alarm - Mobile Clear Maintenance"
    id: car_alarm_mobile_clear_maintenance
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: CLEAR_MAINTENANCE
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_maintenance

# ─────────────────────────────────────────
# HELPERS (Create via UI or include here)
# ─────────────────────────────────────────
input_boolean:
  car_alarm_armed:
    name: Car Alarm Armed
    icon: mdi:car-lock

  car_alarm_maintenance:
    name: Car Alarm Maintenance Mode
    icon: mdi:wrench
