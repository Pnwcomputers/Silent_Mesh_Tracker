# ─────────────────────────────────────────
# PNWC CAR SECURITY — MASTER HA LOGIC
# ─────────────────────────────────────────

automation:
  - alias: "Car Alarm - Master Trigger"
    id: car_alarm_master
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.car_security_upgraded_car_presence
        to: "on"
      - platform: state
        entity_id: binary_sensor.car_security_upgraded_car_vibration
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_armed
        state: "on"
    action:
      - choose:
          # --- CASE 1: CAR IS AT HOME ---
          - conditions:
              - condition: zone
                entity_id: device_tracker.car_security_upgraded
                zone: zone.home
            sequence:
              - service: esphome.house_siren_trigger_alarm
              - service: switch.turn_on
                target:
                  entity_id: switch.frigate_driveway_record
              - service: notify.mobile_app_your_phone
                data:
                  title: "🚨 INTRUDER AT DRIVEWAY"
                  message: "Car presence confirmed. House Siren Active."
                  data:
                    image: "/api/camera_proxy/camera.driveway"
                    actions:
                      - action: "DISARM_CAR_ALARM"
                        title: "Silence Alarm"

          # --- CASE 2: CAR IS AWAY (THEFT) ---
          - conditions:
              - condition: not
                conditions:
                  - condition: zone
                    entity_id: device_tracker.car_security_upgraded
                    zone: zone.home
            sequence:
              - service: notify.mobile_app_your_phone
                data:
                  title: "🚨 VEHICLE STOLEN / MOVING"
                  message: "Live Tracking Active! Location: {{ state_attr('device_tracker.car_security_upgraded', 'latitude') }}, {{ state_attr('device_tracker.car_security_upgraded', 'longitude') }}"
                  data:
                    priority: high
                    ttl: 0
                    clickAction: "/lovelace/car-map"
