# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — HOME ASSISTANT AUTOMATIONS
# Ties car-security ESPHome device to house-siren ESPHome device
# ═══════════════════════════════════════════════════════════════════

# ── Helper: Arm/Disarm toggle (add via HA UI or include here) ──────
# Settings → Devices & Services → Helpers → Create Helper → Toggle
# Name: Car Alarm Armed
# Entity ID: input_boolean.car_alarm_armed

# ─────────────────────────────────────────
# AUTOMATION 1: Vibration only — notification + Frigate
# ─────────────────────────────────────────
automation:
  - alias: "Car Alarm - Vibration Detected"
    id: car_alarm_vibration
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.car_security_sensor_car_vibration
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_armed
        state: "on"
    action:
      # Push notification with camera snapshot
      - service: notify.mobile_app_your_phone
        data:
          title: "⚠️ Car Alarm — Vibration"
          message: "Vehicle disturbance detected"
          data:
            ttl: 0
            priority: high
            image: /api/camera_proxy/camera.driveway  # adjust to your Frigate camera entity
            actions:
              - action: DISARM_CAR_ALARM
                title: Disarm
              - action: TRIGGER_SIREN
                title: Trigger Siren
      # Persistent HA notification
      - service: notify.persistent_notification
        data:
          title: "Car Alarm — Vibration"
          message: "Vibration detected at {{ now().strftime('%H:%M:%S') }}"
      # Trigger Frigate to start recording if not already
      - service: switch.turn_on
        target:
          entity_id: switch.frigate_driveway_record  # adjust to your Frigate entity

# ─────────────────────────────────────────
# AUTOMATION 2: Presence confirmed — escalate to siren
# ─────────────────────────────────────────
  - alias: "Car Alarm - Intruder Confirmed"
    id: car_alarm_intruder
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.car_security_sensor_car_presence
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_armed
        state: "on"
      - condition: state
        entity_id: binary_sensor.car_security_sensor_car_vibration
        state: "on"
    action:
      # Activate siren via ESPHome service call
      - service: esphome.house_siren_trigger_alarm
        data: {}
      # Set trigger label on siren display
      - service: text_sensor.set_value
        target:
          entity_id: text_sensor.house_siren_last_trigger_source
        data:
          value: "Car Intrusion"
      # Critical push notification
      - service: notify.mobile_app_your_phone
        data:
          title: "🚨 INTRUDER — Car Alarm Active"
          message: "Presence confirmed in vehicle. Siren triggered."
          data:
            ttl: 0
            priority: high
            image: /api/camera_proxy/camera.driveway
            actions:
              - action: DISARM_CAR_ALARM
                title: Disarm + Kill Siren
      # Flash all exterior lights
      - service: light.turn_on
        target:
          entity_id: light.exterior_all  # adjust to your light group
        data:
          flash: long

# ─────────────────────────────────────────
# AUTOMATION 3: Mobile action — Disarm
# ─────────────────────────────────────────
  - alias: "Car Alarm - Mobile Disarm Action"
    id: car_alarm_disarm_action
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: DISARM_CAR_ALARM
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_armed
      - service: switch.turn_off
        target:
          entity_id: switch.house_siren_siren_relay
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm Disarmed"
          message: "Alarm disarmed via mobile action"

# ─────────────────────────────────────────
# AUTOMATION 4: Mobile action — Manual siren trigger
# ─────────────────────────────────────────
  - alias: "Car Alarm - Mobile Siren Trigger"
    id: car_alarm_manual_siren
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: TRIGGER_SIREN
    action:
      - service: esphome.house_siren_trigger_alarm
        data: {}

# ─────────────────────────────────────────
# AUTOMATION 5: Low battery warning
# ─────────────────────────────────────────
  - alias: "Car Sensor - Low Battery"
    id: car_sensor_low_battery
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.car_security_sensor_car_battery_voltage
        below: 3.5
    action:
      - service: notify.mobile_app_your_phone
        data:
          title: "🔋 Car Sensor Low Battery"
          message: >
            Car security sensor battery at
            {{ states('sensor.car_security_sensor_car_battery_voltage') }}V.
            Drive to charge or swap battery.

# ─────────────────────────────────────────
# AUTOMATION 6: Time-of-day auto-arm (10 PM)
# Only arms if maintenance mode is OFF
# ─────────────────────────────────────────
  - alias: "Car Alarm - Scheduled Arm 10PM"
    id: car_alarm_scheduled_arm
    mode: single
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_maintenance
        state: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.car_alarm_armed
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm Armed"
          message: "Scheduled arm — 10 PM nightly window active"

# ─────────────────────────────────────────
# AUTOMATION 7: Time-of-day auto-disarm (6 AM)
# ─────────────────────────────────────────
  - alias: "Car Alarm - Scheduled Disarm 6AM"
    id: car_alarm_scheduled_disarm
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_maintenance
        state: "off"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_armed
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm Disarmed"
          message: "Scheduled disarm — 6 AM window ended"

# ─────────────────────────────────────────
# AUTOMATION 8: Maintenance mode ON
# Disarms alarm, notifies, starts hourly auto-recovery watch
# ─────────────────────────────────────────
  - alias: "Car Alarm - Maintenance Mode Activated"
    id: car_alarm_maintenance_on
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.car_alarm_maintenance
        to: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_armed
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm - Maintenance Mode ON"
          message: >
            Alarm disarmed for maintenance. Auto-recovery check every hour.
            System will warn if maintenance is still on overnight.
          data:
            actions:
              - action: CLEAR_MAINTENANCE
                title: Clear Maintenance Now

# ─────────────────────────────────────────
# AUTOMATION 9: Maintenance mode OFF — rearm immediately
# ─────────────────────────────────────────
  - alias: "Car Alarm - Maintenance Mode Cleared"
    id: car_alarm_maintenance_off
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.car_alarm_maintenance
        to: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.car_alarm_armed
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm - Maintenance Cleared"
          message: "Maintenance mode off — alarm rearmed"

# ─────────────────────────────────────────
# AUTOMATION 10: Hourly auto-recovery check
# Warns if maintenance is still on during the 10PM-6AM armed window
# Does NOT force rearm — gives you the choice via notification action
# ─────────────────────────────────────────
  - alias: "Car Alarm - Maintenance Overnight Warning"
    id: car_alarm_maintenance_overnight_warning
    mode: single
    trigger:
      - platform: time_pattern
        hours: "/1"
    condition:
      - condition: state
        entity_id: input_boolean.car_alarm_maintenance
        state: "on"
      - condition: time
        after: "22:00:00"
        before: "06:00:00"
    action:
      - service: notify.mobile_app_your_phone
        data:
          title: "Car Alarm Still in Maintenance"
          message: >
            Maintenance mode has been on since
            {{ states.input_boolean.car_alarm_maintenance.last_changed | as_timestamp | timestamp_custom('%I:%M %p') }}.
            The alarm is DISARMED overnight.
          data:
            ttl: 0
            priority: high
            actions:
              - action: CLEAR_MAINTENANCE
                title: Rearm Now
              - action: IGNORE_MAINTENANCE
                title: Keep Disabled

# ─────────────────────────────────────────
# AUTOMATION 11: Mobile action — clear maintenance from notification
# ─────────────────────────────────────────
  - alias: "Car Alarm - Mobile Clear Maintenance"
    id: car_alarm_mobile_clear_maintenance
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: CLEAR_MAINTENANCE
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.car_alarm_maintenance

# ═══════════════════════════════════════════════════════════════════
# HELPERS REQUIRED
# Add via Settings > Devices & Services > Helpers > Create Helper
# OR paste under input_boolean: in configuration.yaml
# ═══════════════════════════════════════════════════════════════════

input_boolean:
  car_alarm_armed:
    name: Car Alarm Armed
    icon: mdi:car-lock

  car_alarm_maintenance:
    name: Car Alarm Maintenance Mode
    icon: mdi:wrench
