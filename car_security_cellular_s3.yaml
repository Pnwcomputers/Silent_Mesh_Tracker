# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — UPGRADED CELLULAR/GPS EDITION
# Board: LILYGO T-SIM7670G-S3 | Logic: WiFi + LTE + GPS + Radar
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: car-security-upgraded
  on_boot:
    priority: 600
    then:
      - pmu.axp2101.set_vbus_limit: 500mA

esp32:
  board: esp32-s3-devkitc-1
  framework: {type: arduino}

# --- Connectivity ---
api: # Connects to Home Assistant
ota:
wifi:
  networks:
    - ssid: "Your_WiFi"
      password: "Your_Password"

i2c:
  sda: GPIO12
  scl: GPIO11

pmu:
  - platform: axp2101
    address: 0x34

uart:
  - id: modem_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
  - id: radar_uart
    tx_pin: GPIO2
    rx_pin: GPIO3
    baud_rate: 256000

# --- Sensors ---
ld2410:

binary_sensor:
  - platform: gpio
    pin: GPIO1 
    id: car_vibration
    name: "Car Vibration"
    device_class: vibration
  
  - platform: ld2410
    has_target:
      name: "Car Presence"
      id: car_presence

# --- Cellular & GPS ---
sim7000:
  id: modem
  uart_id: modem_uart
  pwr_key_pin: GPIO13
  apn: "your_apn"
  gps:
    latitude: { id: car_lat }
    longitude: { id: car_lon }

# --- Automation Logic ---
script:
  - id: alert_sequence
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "WiFi OK: Alerting Home Assistant"
          else:
            - logger.log: "WiFi DOWN: Sending Emergency SMS"
            - sim7000.send_at_command: "AT+CGNSPWR=1"
            - delay: 10s
            - sim7000.send_sms:
                number: "+15551234567"
                message: !lambda |-
                  return "🚨 ALARM TRIGGERED! Car moved or entered. GPS: " + id(car_lat).state + "," + id(car_lon).state;

sensor:
  - platform: axp2101
    battery_voltage:
      name: "Battery Voltage"
      id: batt_volts
