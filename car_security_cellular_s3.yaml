# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — UPGRADED CELLULAR/GPS EDITION
# Hardware: LILYGO T-SIM7670G-S3 (ESP32-S3 + LTE + GPS)
# Logic: WiFi (Primary) + LTE SMS (Failover) + GPS + Radar + SD Log
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: car-security-upgraded
  friendly_name: Car Security Pro
  on_boot:
    priority: 600
    then:
      - pmu.axp2101.set_vbus_limit: 500mA
      - script.execute: stealth_mode

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# --- Connectivity ---
api: # Connects to Home Assistant
ota:
wifi:
  networks:
    - ssid: "Your_WiFi_Name"
      password: "Your_WiFi_Password"
  ap:
    ssid: "Car-Security-Hotspot"

# --- Power & Modem Hardware ---
i2c:
  sda: GPIO12
  scl: GPIO11

pmu:
  - platform: axp2101
    address: 0x34

uart:
  - id: modem_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
  - id: radar_uart
    tx_pin: GPIO2
    rx_pin: GPIO3
    baud_rate: 256000

# --- Sensors ---
ld2410:

binary_sensor:
  - platform: gpio
    pin: GPIO1 
    id: car_vibration
    name: "Car Vibration"
    device_class: vibration
    on_press:
      then:
        - script.execute: alert_logic

  - platform: ld2410
    has_target:
      name: "Car Presence"
      id: car_presence
      on_press:
        then:
          - script.execute: alert_logic

# --- Cellular & GPS ---
sim7000:
  id: modem
  uart_id: modem_uart
  pwr_key_pin: GPIO13
  apn: "hologram" # Update to your specific IoT SIM APN
  gps:
    latitude: 
      name: "Car Latitude"
      id: car_lat
    longitude: 
      name: "Car Longitude"
      id: car_lon

# --- Management Entities ---
button:
  - platform: restart
    name: "Restart Car Tracker"
    id: restart_s3

# --- Intelligent Alert Logic ---
script:
  - id: stealth_mode
    then:
      - sim7000.send_at_command: "AT+CNETLIGHT=0" # Disables modem status LED
      - logger.log: "🌑 Stealth Mode Active (Visuals Disabled)"

  - id: alert_logic
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "WiFi OK: Alerting Home Assistant via API"
          else:
            - logger.log: "WiFi JAMMED/OUT OF RANGE: Sending LTE SMS"
            - sim7000.send_at_command: "AT+CGNSPWR=1"
            - delay: 15s # Wait for GPS stabilization
            - sim7000.send_sms:
                number: "+15550000000" # UPDATE TO YOUR PHONE NUMBER
                message: !lambda |-
                  return "🚨 PNWC ALARM: WiFi Lost! Intrusion Detected. GPS: http://maps.google.com/maps?q=" 
                         + to_string(id(car_lat).state) + "," + to_string(id(car_lon).state);

sensor:
  - platform: axp2101
    battery_voltage:
      name: "18650 Battery Voltage"
      id: batt_volts
      on_value_range:
        - below: 3.4
          then:
            - script.execute: last_gasp_sequence

  - id: last_gasp_sequence
    mode: single
    then:
      - sim7000.send_at_command: "AT+CGNSPWR=1"
      - delay: 60s
      - sim7000.send_sms:
          number: "+15550000000"
          message: "🔋 BATT CRITICAL. Sending final GPS coordinates before shutdown."
      - deep_sleep.enter: shutdown_sleep

deep_sleep:
  id: shutdown_sleep
