# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — UPGRADED CELLULAR/GPS EDITION
# Board: LILYGO T-SIM7670G-S3
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: car-security-upgraded
  friendly_name: Car Security Pro
  on_boot:
    priority: 600
    then:
      - pmu.axp2101.set_vbus_limit: 500mA
      - script.execute: stealth_mode

esp32:
  board: esp32-s3-devkitc-1
  framework: {type: arduino}

api:
ota:
wifi:
  networks:
    - ssid: "Your_WiFi"
      password: "Your_Password"

# --- Power & Modem Hardware ---
i2c:
  sda: GPIO12
  scl: GPIO11

pmu:
  - platform: axp2101
    address: 0x34

uart:
  - id: modem_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
  - id: radar_uart
    tx_pin: GPIO2
    rx_pin: GPIO3
    baud_rate: 256000

# --- Sensors ---
ld2410:

binary_sensor:
  - platform: gpio
    pin: GPIO1 
    id: car_vibration
    name: "Car Vibration"
    device_class: vibration
    on_press:
      then:
        - script.execute: alert_logic

  - platform: ld2410
    has_target:
      name: "Car Presence"
      id: car_presence
      on_press:
        then:
          - script.execute: alert_logic

# --- Cellular & GPS ---
sim7000:
  id: modem
  uart_id: modem_uart
  pwr_key_pin: GPIO13
  apn: "hologram" 
  gps:
    latitude: { id: car_lat }
    longitude: { id: car_lon }

# --- Intelligent Logic ---
script:
  - id: stealth_mode
    then:
      - sim7000.send_at_command: "AT+CNETLIGHT=0"
      - logger.log: "🌑 Stealth Mode Active"

  - id: alert_logic
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "WiFi Connected: Signaling Home Assistant API"
          else:
            - logger.log: "WiFi Out/Jammed: Activating LTE Failover"
            - sim7000.send_at_command: "AT+CGNSPWR=1"
            - delay: 15s
            - sim7000.send_sms:
                number: "+15551234567"
                message: !lambda |-
                  return "🚨 PNWC ALARM: Intrusion while WiFi Offline. GPS: http://maps.google.com/maps?q=" 
                         + to_string(id(car_lat).state) + "," + to_string(id(car_lon).state);

sensor:
  - platform: axp2101
    battery_voltage:
      name: "18650 Battery Voltage"
      id: batt_volts
      on_value_range:
        - below: 3.4
          then:
            - script.execute: last_gasp_sequence

  - id: last_gasp_sequence
    mode: single
    then:
      - sim7000.send_at_command: "AT+CGNSPWR=1"
      - delay: 60s
      - sim7000.send_sms:
          number: "+15551234567"
          message: "🔋 BATT CRITICAL. Final Location pinged to Mesh/API."
      - deep_sleep.enter: shutdown_sleep

deep_sleep:
  id: shutdown_sleep
