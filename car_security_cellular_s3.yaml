# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — ULTIMATE PRO EDITION
# Hardware: LILYGO T-SIM7670G-S3 (ESP32-S3 + LTE + GPS + SD + BLE)
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: car-security-upgraded
  friendly_name: Car Security Pro
  on_boot:
    priority: 600
    then:
      - pmu.axp2101.set_vbus_limit: 500mA
      - script.execute: stealth_mode

esp32:
  board: esp32-s3-devkitc-1
  framework: {type: arduino}

# --- 🛰️ Connectivity ---
api: 
ota:
wifi:
  networks:
    - ssid: "Your_WiFi"
      password: "Your_Password"

# --- 🕵️ Private Bluetooth Fox-Hunt Beacon ---
esp32_ble_beacon:
  type: iBeacon
  uuid: "D34DBEEF-1234-5678-90AB-CDEF12345678" 
  major: 100
  minor: 1
  tx_power: 4 

# --- 🔌 Hardware Setup ---
i2c:
  sda: GPIO12
  scl: GPIO11

pmu:
  - platform: axp2101
    address: 0x34

uart:
  - id: modem_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
  - id: radar_uart
    tx_pin: GPIO2
    rx_pin: GPIO3
    baud_rate: 256000

# --- 📡 Cellular & GPS ---
sim7000:
  id: modem
  uart_id: modem_uart
  pwr_key_pin: GPIO13
  apn: "hologram" 
  gps:
    latitude: { id: car_lat, on_value: { then: [script.execute: log_to_blackbox] } }
    longitude: { id: car_lon, on_value: { then: [script.execute: log_to_blackbox] } }

# --- 💾 Black Box & Alert Logic ---
script:
  - id: stealth_mode
    then:
      - sim7000.send_at_command: "AT+CNETLIGHT=0"
      - logger.log: "🌑 Stealth Mode Active"

  - id: log_to_blackbox
    mode: throttle
    delay: 30s
    then:
      - lambda: |-
          if (id(car_lat).has_state()) {
            FILE *f = fopen("/sd/blackbox.log", "a");
            if (f != NULL) {
              fprintf(f, "%.6f,%.6f\n", id(car_lat).state, id(car_lon).state);
              fclose(f);
            }
          }

  - id: alert_logic
    mode: single
    then:
      - if:
          condition: { wifi.connected: }
          then: { logger.log: "WiFi OK" }
          else:
            - sim7000.send_at_command: "AT+CGNSPWR=1"
            - delay: 15s
            - sim7000.send_sms:
                number: "+15550000000"
                message: !lambda |-
                  return "🚨 PNWC PRO: WiFi Lost/Intrusion! GPS: http://maps.google.com/maps?q=" 
                         + to_string(id(car_lat).state) + "," + to_string(id(car_lon).state);

# --- ⚡ Sensors ---
sensor:
  - platform: axp2101
    battery_voltage: { name: "18650 Battery Voltage", id: car_security_upgraded_18650_battery_voltage }

binary_sensor:
  - platform: gpio
    pin: GPIO1 
    id: car_vibration
    name: "Car Vibration"
    on_press: { then: [script.execute: alert_logic] }
  - platform: ld2410
    has_target:
      name: "Car Presence"
      on_press: { then: [script.execute: alert_logic] }

button:
  - platform: restart
    name: "Remote Reset Tracker"
    id: restart_s3
