# ═══════════════════════════════════════════════════════════════════
# PNWC CAR SECURITY — UPGRADED CELLULAR/GPS/BLACKBOX EDITION
# Hardware: LILYGO T-SIM7670G-S3 (ESP32-S3 + LTE + GPS + SD Card)
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: car-security-upgraded
  friendly_name: Car Security Pro
  on_boot:
    priority: 600
    then:
      - pmu.axp2101.set_vbus_limit: 500mA
      - script.execute: stealth_mode

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# --- Connectivity ---
api:
ota:
wifi:
  networks:
    - ssid: "Your_WiFi_Name"
      password: "Your_WiFi_Password"

# --- Power & Modem Hardware ---
i2c:
  sda: GPIO12
  scl: GPIO11

pmu:
  - platform: axp2101
    address: 0x34

uart:
  - id: modem_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
  - id: radar_uart
    tx_pin: GPIO2
    rx_pin: GPIO3
    baud_rate: 256000

# --- SD Card "Black Box" Logging ---
# T-SIM7670G-S3 uses SDIO for the TF card slot
sdcard:
  cs_pin: GPIO10 # Check specific board revision, usually 10 on S3-SIM
  
# --- Sensors ---
ld2410:

binary_sensor:
  - platform: gpio
    pin: GPIO1 
    id: car_vibration
    name: "Car Vibration"
    device_class: vibration
    on_press:
      then:
        - script.execute: alert_logic

  - platform: ld2410
    has_target:
      name: "Car Presence"
      id: car_presence
      on_press:
        then:
          - script.execute: alert_logic

# --- Cellular & GPS ---
sim7000:
  id: modem
  uart_id: modem_uart
  pwr_key_pin: GPIO13
  apn: "hologram"
  gps:
    latitude: 
      id: car_lat
      on_value:
        then:
          - script.execute: log_to_blackbox
    longitude: 
      id: car_lon
      id: car_lon
      on_value:
        then:
          - script.execute: log_to_blackbox

# --- Management ---
button:
  - platform: restart
    name: "Restart Car Tracker"
    id: restart_s3

# --- Black Box & Alert Logic ---
script:
  - id: stealth_mode
    then:
      - sim7000.send_at_command: "AT+CNETLIGHT=0"
      - logger.log: "🌑 Stealth Mode Active"

  - id: log_to_blackbox
    mode: throttle
    delay: 30s # Record a GPS point every 30 seconds
    then:
      - lambda: |-
          static int log_count = 0;
          if (id(car_lat).has_state()) {
            FILE *f = fopen("/sd/blackbox.log", "a");
            if (f != NULL) {
              fprintf(f, "LAT:%.6f, LON:%.6f, VOLTS:%.2f\n", id(car_lat).state, id(car_lon).state, id(batt_volts).state);
              fclose(f);
              if (++log_count % 10 == 0) ESP_LOGI("SD", "Black Box: 10 points written to SD");
            }
          }

  - id: alert_logic
    mode: single
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - logger.log: "WiFi OK: Alerting Home Assistant"
          else:
            - logger.log: "WiFi Offline: Sending LTE Failover SMS"
            - sim7000.send_at_command: "AT+CGNSPWR=1"
            - delay: 15s
            - sim7000.send_sms:
                number: "+15550000000"
                message: !lambda |-
                  return "🚨 PNWC ALARM: Intrusion! WiFi Offline. GPS: http://maps.google.com/maps?q=" 
                         + to_string(id(car_lat).state) + "," + to_string(id(car_lon).state);

sensor:
  - platform: axp2101
    battery_voltage:
      name: "18650 Battery Voltage"
      id: batt_volts
