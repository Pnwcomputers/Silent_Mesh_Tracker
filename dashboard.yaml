type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: 🚨 PNWC Security Pro
    subtitle: System Status & Controls

  - type: map
    entities:
      - entity: device_tracker.car_security_upgraded
    hours_to_show: 24
    default_zoom: 15

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: input_boolean.car_alarm_armed
        name: Alarm System
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: input_boolean.car_alarm_maintenance
        name: Maintenance
        icon_color: orange

  - type: entities
    entities:
      - entity: sensor.car_security_upgraded_18650_battery_voltage
        name: Battery Health
      - entity: binary_sensor.car_security_upgraded_car_presence
        name: Interior Presence
