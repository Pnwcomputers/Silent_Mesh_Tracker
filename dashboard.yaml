# ═══════════════════════════════════════════════════════════════════
# PNWC PRO SECURITY DASHBOARD
# Includes: Live Map, Battery Health, & Remote Reset
# ═══════════════════════════════════════════════════════════════════

type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: 🚨 PNWC Security Pro
    subtitle: System Status: Online (GPS Locked)

  # --- Live Tracking Map ---
  - type: map
    entities:
      - entity: device_tracker.car_security_upgraded
    hours_to_show: 24
    default_zoom: 15
    aspect_ratio: 16:9

  # --- Primary Controls ---
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: input_boolean.car_alarm_armed
        name: Alarm System
        icon_color: red
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: input_boolean.car_alarm_maintenance
        name: Maintenance
        icon_color: orange
        tap_action:
          action: toggle

  # --- System Health Chips ---
  - type: custom:mushroom-chips-card
    chips:
      - type: entity
        entity: sensor.car_security_upgraded_18650_battery_voltage
        icon: mdi:battery
      - type: entity
        entity: sensor.car_security_upgraded_gps_signal
        icon: mdi:satellite-variant
      - type: entity
        entity: binary_sensor.car_security_upgraded_car_power_detected
        name: Charging

  # --- Emergency Tools ---
  - type: custom:mushroom-button-card
    icon: mdi:restart
    name: Remote Reset Tracker
    icon_color: red
    layout: horizontal
    tap_action:
      action: call-service
      service: button.press
      target:
        entity_id: button.car_security_upgraded_restart_car_tracker
      confirmation:
        text: Are you sure you want to remotely reboot the S3-SIM tracker?
